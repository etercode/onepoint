services:
  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: onepoint_php
    volumes:
      - ./:/var/www/app:cached
    depends_on:
      database:
        condition: service_healthy
    restart: unless-stopped

  nginx:
    image: nginx:1.31.2-alpine
    container_name: onepoint_nginx
    ports:
      - "8088:80"
    volumes:
      - ./:/var/www/app:ro,cached
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php
    restart: unless-stopped

  database:
    image: postgres:${POSTGRES_VERSION:-18}-alpine
    container_name: onepoint_db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-onepoint}
      POSTGRES_USER: ${POSTGRES_USER:-app}
      # Change this in production.
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-app}
      # Keep a stable data path inside the named volume across image versions.
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - database_data:/var/lib/postgresql/data:rw
    ports:
      # Exposed on host 5433 to avoid clashing with a local Postgres on 5432.
      # Inside the Docker network the port stays 5432.
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-app} -d ${POSTGRES_DB:-onepoint}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  database_data:
