security:
    # https://symfony.com/doc/current/security.html#registering-the-user-hashing-passwords
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

    # https://symfony.com/doc/current/security.html#loading-the-user-the-user-provider
    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email

    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false

        # json_login handles POST /api/login (see security.html#json-login).
        login:
            pattern: ^/api/login$
            stateless: true
            provider: app_user_provider
            json_login:
                check_path: api_login
                username_path: email
                password_path: password
                success_handler: App\Security\LoginSuccessHandler
                failure_handler: App\Security\LoginFailureHandler

        # All other /api routes are protected by our self-managed access token
        # (see security/access_token.html).
        api:
            pattern: ^/api
            stateless: true
            provider: app_user_provider
            access_token:
                token_handler: App\Security\AccessTokenHandler

    # https://symfony.com/doc/current/security.html#securing-url-patterns-access-control
    access_control:
        - { path: ^/api/register, roles: PUBLIC_ACCESS }
        - { path: ^/api/login, roles: PUBLIC_ACCESS }
        - { path: ^/api/token/refresh, roles: PUBLIC_ACCESS }
        # Username availability is needed by the registration form (pre-auth).
        - { path: ^/api/username/available, roles: PUBLIC_ACCESS }
        # Public storefront catalog (read-only): products, categories, collections.
        - { path: ^/api/products, roles: PUBLIC_ACCESS }
        - { path: ^/api/categories, roles: PUBLIC_ACCESS }
        - { path: ^/api/collections, roles: PUBLIC_ACCESS }
        # Public catalog mega-menu content + typo-tolerant search suggestions.
        - { path: ^/api/catalog-menu, roles: PUBLIC_ACCESS }
        - { path: ^/api/search, roles: PUBLIC_ACCESS }
        # Storefront consultation form submits publicly (POST only is routed).
        - { path: ^/api/consultations, roles: PUBLIC_ACCESS }
        # Admin catalog management requires the admin role (token + ROLE_ADMIN).
        - { path: ^/api/admin, roles: ROLE_ADMIN }
        - { path: ^/api, roles: IS_AUTHENTICATED_FULLY }

when@test:
    security:
        password_hashers:
            # By far the fastest algorithm, but only for tests (insecure).
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4 # Lowest possible value for bcrypt
                time_cost: 3 # Lowest possible value for argon
                memory_cost: 10 # Lowest possible value for argon
