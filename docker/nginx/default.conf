# Official Symfony nginx configuration
# https://symfony.com/doc/current/setup/web_server_configuration.html
server {
    listen 80;
    server_name _;

    root /var/www/app/public;

    # Keep redirects relative so the host port (8088) isn't dropped behind Docker.
    absolute_redirect off;

    # Allow profile-photo uploads. Kept above the app's 5M image cap (and PHP's
    # upload limits) so oversized files get a clean 422 from the validator
    # instead of nginx's 413.
    client_max_body_size 10m;

    # API documentation (Swagger UI + OpenAPI spec) served statically from
    # the repo's docs/ directory. Self-contained, no PHP involved.
    location = /docs {
        return 301 /docs/;
    }
    location /docs/ {
        alias /var/www/app/docs/;
        index index.html;
        try_files $uri $uri/ /docs/index.html;
        # Make the spec render inline rather than download.
        types {
            text/html                             html;
            text/css                              css;
            application/javascript                js;
            application/yaml                      yaml;
        }
    }

    location / {
        # try to serve file directly, fallback to index.php
        try_files $uri /index.php$is_args$args;
    }

    location ~ ^/index\.php(/|$) {
        fastcgi_pass php:9000;
        fastcgi_split_path_info ^(.+\.php)(/.*)$;
        include fastcgi_params;

        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $realpath_root;

        # Prevents URIs that include the front controller. This will 404:
        # http://example.com/index.php/some-path
        internal;
    }

    # Return 404 for all other php files not matching the front controller.
    location ~ \.php$ {
        return 404;
    }

    error_log /var/log/nginx/error.log;
    access_log /var/log/nginx/access.log;
}
