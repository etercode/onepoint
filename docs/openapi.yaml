openapi: 3.1.0
info:
  title: onepoint API
  version: 0.1.0
  description: |
    REST API for onepoint.

    ## Authentication
    Most endpoints require a self-managed **Bearer access token** (no JWT).
    1. `POST /api/register` to create an account.
    2. `POST /api/login` to obtain an `access_token` (+ `refresh_token`).
    3. Send `Authorization: Bearer <access_token>` on protected endpoints.
    4. `POST /api/token/refresh` to rotate an expired access token.
    5. `POST /api/logout` to revoke the current token.

    Access tokens live 1 hour; refresh tokens live 30 days. A user may hold
    many tokens at once (one per device); logging out revokes only the token
    presented.

    ### Testing here
    Use **Authorize** (top right) and paste the `access_token` from a login
    response to call protected endpoints with "Try it out".

servers:
  - url: http://localhost:8088
    description: Local Docker environment

tags:
  - name: Auth
    description: Registration, login, token lifecycle
  - name: User
    description: Current user

paths:
  /api/register:
    post:
      tags: [Auth]
      summary: Register a new user
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
            example:
              email: alice@example.com
              password: s3cret!!
              username: alice
              name: Alice
              lastname: Smith
              birthday: "1995-04-12"
              statusText: Hello there
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserCreated'
        '409':
          description: Email or username already in use
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                email:
                  value: { error: email_already_used }
                username:
                  value: { error: username_already_used }
        '422':
          description: Validation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'

  /api/login:
    post:
      tags: [Auth]
      summary: Log in (json_login) and receive tokens
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Credentials'
            example:
              email: alice@example.com
              password: s3cret!!
      responses:
        '200':
          description: Authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: invalid_credentials
                message: Invalid email or password.

  /api/token/refresh:
    post:
      tags: [Auth]
      summary: Rotate tokens using a refresh token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
            example:
              refresh_token: 93dfa0515e30f1c1a1893663eed35fda74348861ab6cab74e10043d68913f3a9
      responses:
        '200':
          description: New token pair issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '400':
          description: Missing refresh_token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: missing_field
                field: refresh_token
        '401':
          description: Refresh token invalid or expired
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: invalid_refresh_token

  /api/logout:
    post:
      tags: [Auth]
      summary: Revoke the presented access token
      security:
        - bearerAuth: []
      responses:
        '204':
          description: Logged out (token revoked). No content.
        '401':
          description: Missing or invalid access token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/me:
    get:
      tags: [User]
      summary: Get the currently authenticated user
      security:
        - bearerAuth: []
      responses:
        '200':
          description: The current user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          description: Missing or invalid access token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: Paste the `access_token` returned by `/api/login`.

  schemas:
    RegisterRequest:
      type: object
      required: [email, password, username, name, lastname]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
          maxLength: 4096
        username:
          type: string
          minLength: 3
          maxLength: 180
        name:
          type: string
          maxLength: 100
        lastname:
          type: string
          maxLength: 100
        profilePhoto:
          type: [string, "null"]
          maxLength: 255
          description: Filename or path reference (not the binary).
        birthday:
          type: [string, "null"]
          format: date
          description: YYYY-MM-DD
        description:
          type: [string, "null"]
        statusText:
          type: [string, "null"]
          maxLength: 255
          description: Short free-text status (1-2 sentences).

    Credentials:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    RefreshRequest:
      type: object
      required: [refresh_token]
      properties:
        refresh_token:
          type: string

    TokenResponse:
      type: object
      properties:
        token_type:
          type: string
          example: Bearer
        access_token:
          type: string
        expires_at:
          type: string
          format: date-time
        refresh_token:
          type: string
        refresh_token_expires_at:
          type: string
          format: date-time

    UserCreated:
      type: object
      properties:
        id:
          type: integer
        email:
          type: string
        username:
          type: string

    User:
      type: object
      properties:
        id:
          type: integer
        email:
          type: string
        username:
          type: string
        name:
          type: string
        lastname:
          type: string
        roles:
          type: array
          items:
            type: string
          example: [ROLE_USER]
        profilePhoto:
          type: [string, "null"]
        birthday:
          type: [string, "null"]
          format: date
        description:
          type: [string, "null"]
        statusText:
          type: [string, "null"]

    Error:
      type: object
      properties:
        error:
          type: string
        message:
          type: string

    ValidationError:
      description: Symfony validation error (RFC 7807-style).
      type: object
      properties:
        type:
          type: string
        title:
          type: string
          example: Validation Failed
        status:
          type: integer
          example: 422
        detail:
          type: string
        violations:
          type: array
          items:
            type: object
            properties:
              propertyPath:
                type: string
              title:
                type: string
