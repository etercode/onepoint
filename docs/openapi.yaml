openapi: 3.1.0
info:
  title: onepoint API
  version: 0.1.0
  description: |
    REST API for onepoint.

    ## Authentication
    Most endpoints require a self-managed **Bearer access token** (no JWT).
    1. `POST /api/register` to create an account.
    2. `POST /api/login` to obtain an `access_token` (+ `refresh_token`).
    3. Send `Authorization: Bearer <access_token>` on protected endpoints.
    4. `POST /api/token/refresh` to rotate an expired access token.
    5. `POST /api/logout` to revoke the current token.

    Access tokens live 1 hour; refresh tokens live 30 days. A user may hold
    many tokens at once (one per device); logging out revokes only the token
    presented.

    ### Testing here
    Use **Authorize** (top right) and paste the `access_token` from a login
    response to call protected endpoints with "Try it out".

servers:
  - url: http://localhost:8088
    description: Local Docker environment

tags:
  - name: Auth
    description: Registration, login, token lifecycle
  - name: User
    description: Current user
  - name: Catalog
    description: Public storefront catalog (products, categories, collections)
  - name: Admin
    description: Admin catalog management (requires ROLE_ADMIN)

paths:
  /api/register:
    post:
      tags: [Auth]
      summary: Register a new user
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
            example:
              email: alice@example.com
              password: s3cret!!
              username: alice
              name: Alice
              lastname: Smith
              birthday: "1995-04-12"
              statusText: Hello there
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserCreated'
        '409':
          description: Email or username already in use
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                email:
                  value: { error: email_already_used }
                username:
                  value: { error: username_already_used }
        '422':
          description: Validation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'

  /api/login:
    post:
      tags: [Auth]
      summary: Log in (json_login) and receive tokens
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Credentials'
            example:
              email: alice@example.com
              password: s3cret!!
      responses:
        '200':
          description: Authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: invalid_credentials
                message: Invalid email or password.

  /api/token/refresh:
    post:
      tags: [Auth]
      summary: Rotate tokens using a refresh token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
            example:
              refresh_token: 93dfa0515e30f1c1a1893663eed35fda74348861ab6cab74e10043d68913f3a9
      responses:
        '200':
          description: New token pair issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '400':
          description: Missing refresh_token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: missing_field
                field: refresh_token
        '401':
          description: Refresh token invalid or expired
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: invalid_refresh_token

  /api/logout:
    post:
      tags: [Auth]
      summary: Revoke the presented access token
      security:
        - bearerAuth: []
      responses:
        '204':
          description: Logged out (token revoked). No content.
        '401':
          description: Missing or invalid access token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/me:
    get:
      tags: [User]
      summary: Get the currently authenticated user
      security:
        - bearerAuth: []
      responses:
        '200':
          description: The current user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          description: Missing or invalid access token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    patch:
      tags: [User]
      summary: Update the authenticated user's profile
      description: >
        Full replacement of the editable profile fields. Send all of them
        (a profile form holds the current values). Email and password are not
        editable here (see the dedicated password endpoint).
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProfileRequest'
            example:
              username: alice
              name: Alice
              lastname: Smith
              timezone: Europe/Istanbul
              language: az
              birthday: "1995-04-12"
              statusText: Hello there
      responses:
        '200':
          description: Updated user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          description: Missing or invalid access token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Username already in use by another user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: username_already_used
        '422':
          description: Validation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'

  /api/me/password:
    post:
      tags: [User]
      summary: Change the authenticated user's password
      description: >
        Verifies the current password, then sets the new one. On success every
        OTHER session is revoked; the token used for this request stays valid.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
            example:
              currentPassword: s3cret!!
              newPassword: n3ws3cret!!
      responses:
        '204':
          description: Password changed. No content.
        '401':
          description: Missing or invalid access token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          description: Current password is wrong, or new password failed validation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: invalid_current_password

  /api/me/photo:
    post:
      tags: [User]
      summary: Upload or replace the authenticated user's profile photo
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [photo]
              properties:
                photo:
                  type: string
                  format: binary
                  description: JPEG, PNG or WebP image, max 5 MB.
      responses:
        '200':
          description: Photo stored
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PhotoUploaded'
        '401':
          description: Missing or invalid access token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          description: Missing file or invalid image (type/size)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'

  /api/username/available:
    get:
      tags: [User]
      summary: Check whether a username is available
      description: >
        Public (used by the registration and profile-edit forms). Reports
        availability among active users; it is user-agnostic, so the edit form
        should skip the call when the username is unchanged.
      security: []
      parameters:
        - name: username
          in: query
          required: true
          schema:
            type: string
            minLength: 3
            maxLength: 180
      responses:
        '200':
          description: Availability result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UsernameAvailability'
              example:
                username: alice
                available: false
        '422':
          description: Missing or malformed username
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'

  /api/me/preferences:
    get:
      tags: [User]
      summary: Get the authenticated user's preferences
      description: >
        Client-side appearance/theming preferences. Returns only the values the
        user has saved (an empty appearance object if none); the client applies
        its own defaults for absent fields.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Saved preferences (no server-side defaults)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserPreferences'
              example:
                appearance:
                  theme: dark
                  accent: purple
        '401':
          description: Missing or invalid access token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    patch:
      tags: [User]
      summary: Update the authenticated user's preferences
      description: >
        Partial update — send any subset of the preferences object; provided
        fields are merged onto the stored preferences. Returns the full
        preferences object after the merge.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePreferencesRequest'
            example:
              appearance:
                theme: dark
                accent: purple
      responses:
        '200':
          description: Saved preferences after merge
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserPreferences'
              example:
                appearance:
                  theme: dark
                  accent: purple
        '401':
          description: Missing or invalid access token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          description: Validation failed (unknown enum value)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'

  /api/products:
    get:
      summary: List storefront products
      description: >
        Public, read-only. Returns products matching the optional filters plus
        the total count for those filters (ignoring limit/offset). Absent
        filters mean "no constraint".
      tags: [Catalog]
      security: []
      parameters:
        - { name: category, in: query, schema: { type: string }, description: Category slug }
        - { name: collection, in: query, schema: { type: string }, description: Collection slug }
        - { name: q, in: query, schema: { type: string }, description: Free-text search }
        - { name: ids, in: query, schema: { type: string }, description: 'Comma-separated product ids (cart hydration), e.g. 3,7,12' }
        - { name: isNew, in: query, schema: { type: boolean } }
        - { name: onSale, in: query, schema: { type: boolean } }
        - { name: inStock, in: query, schema: { type: boolean } }
        - { name: minPrice, in: query, schema: { type: integer, minimum: 0 } }
        - { name: maxPrice, in: query, schema: { type: integer, minimum: 0 } }
        - { name: sort, in: query, schema: { type: string, enum: [default, price_asc, price_desc, newest, name], default: default } }
        - { name: limit, in: query, schema: { type: integer, minimum: 1, maximum: 100 } }
        - { name: offset, in: query, schema: { type: integer, minimum: 0, default: 0 } }
      responses:
        '200':
          description: Matched products
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { $ref: '#/components/schemas/Product' }
                  total: { type: integer }
        '422':
          description: Invalid query parameter
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ValidationError' }

  /api/products/{id}:
    get:
      summary: Get a product by id
      tags: [Catalog]
      security: []
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        '200':
          description: The product
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Product' }
        '404':
          description: Product not found
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /api/products/{id}/related:
    get:
      summary: Get products related to the given one
      description: Same collection or category, excluding the product itself.
      tags: [Catalog]
      security: []
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        '200':
          description: Related products
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { $ref: '#/components/schemas/Product' }
        '404':
          description: Product not found
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /api/categories:
    get:
      summary: List categories
      description: Public, read-only. productCount and priceFrom are derived live.
      tags: [Catalog]
      security: []
      responses:
        '200':
          description: Categories
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { $ref: '#/components/schemas/Category' }

  /api/categories/{slug}:
    get:
      summary: Get a category by slug
      tags: [Catalog]
      security: []
      parameters:
        - { name: slug, in: path, required: true, schema: { type: string } }
      responses:
        '200':
          description: The category
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Category' }
        '404':
          description: Category not found
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /api/collections:
    get:
      summary: List collections
      tags: [Catalog]
      security: []
      parameters:
        - { name: featured, in: query, schema: { type: boolean }, description: Only the curated home-page set }
      responses:
        '200':
          description: Collections
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { $ref: '#/components/schemas/Collection' }

  /api/collections/{slug}:
    get:
      summary: Get a collection by slug
      tags: [Catalog]
      security: []
      parameters:
        - { name: slug, in: path, required: true, schema: { type: string } }
      responses:
        '200':
          description: The collection
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Collection' }
        '404':
          description: Collection not found
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /api/admin/products:
    post:
      summary: Create a product
      description: Requires ROLE_ADMIN. Slug is derived from the name.
      tags: [Admin]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ProductWriteRequest' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Product' }
        '401': { description: Missing/invalid token }
        '403': { description: Not an admin }
        '409':
          description: Slug already used
          content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } }
        '422':
          description: Validation failed / invalid category or collection
          content: { application/json: { schema: { $ref: '#/components/schemas/ValidationError' } } }

  /api/admin/products/{id}:
    put:
      summary: Replace a product
      description: Requires ROLE_ADMIN. Full replacement of editable fields.
      tags: [Admin]
      security:
        - bearerAuth: []
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ProductWriteRequest' }
      responses:
        '200':
          description: Updated
          content: { application/json: { schema: { $ref: '#/components/schemas/Product' } } }
        '403': { description: Not an admin }
        '404': { description: Product not found }
        '409': { description: Slug already used }
        '422': { description: Validation failed / invalid category or collection }
    patch:
      summary: Partial product update (inline list toggles)
      description: Requires ROLE_ADMIN. Applies only the provided fields (stock / new); used by the admin product list quick toggles.
      tags: [Admin]
      security:
        - bearerAuth: []
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ProductQuickUpdateRequest' }
      responses:
        '200':
          description: Updated
          content: { application/json: { schema: { $ref: '#/components/schemas/Product' } } }
        '403': { description: Not an admin }
        '404': { description: Product not found }
    delete:
      summary: Soft-delete a product
      tags: [Admin]
      security:
        - bearerAuth: []
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        '204': { description: Deleted }
        '403': { description: Not an admin }
        '404': { description: Product not found }

  /api/admin/products/{id}/images:
    post:
      summary: Add a gallery image by URL
      description: >-
        Requires ROLE_ADMIN. A remote (http/https) URL is downloaded and stored
        locally under public/uploads/products (self-hosted), then appended to the
        gallery.
      tags: [Admin]
      security:
        - bearerAuth: []
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [url]
              properties:
                url: { type: string, maxLength: 500 }
      responses:
        '201':
          description: Added
          content: { application/json: { schema: { $ref: '#/components/schemas/ProductImage' } } }
        '403': { description: Not an admin }
        '404': { description: Product not found }
        '422': { description: Validation failed / image_download_failed }

  /api/admin/products/{id}/images/upload:
    post:
      summary: Add a gallery image from a file
      description: Requires ROLE_ADMIN. multipart/form-data with an `image` field (JPEG/PNG/WebP, max 5MB).
      tags: [Admin]
      security:
        - bearerAuth: []
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                image: { type: string, format: binary }
      responses:
        '201':
          description: Stored
          content: { application/json: { schema: { $ref: '#/components/schemas/ProductImage' } } }
        '403': { description: Not an admin }
        '404': { description: Product not found }
        '422': { description: Not a valid image }

  /api/admin/products/{id}/images/order:
    put:
      summary: Reorder a product's gallery
      description: Requires ROLE_ADMIN. `ids` must be the product's full set of image ids in the desired order; the first becomes primary.
      tags: [Admin]
      security:
        - bearerAuth: []
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ids]
              properties:
                ids: { type: array, items: { type: integer } }
      responses:
        '200':
          description: Reordered product
          content: { application/json: { schema: { $ref: '#/components/schemas/Product' } } }
        '403': { description: Not an admin }
        '404': { description: Product not found }
        '422': { description: ids is not the product's image set }

  /api/admin/products/{id}/images/{imageId}:
    delete:
      summary: Remove a gallery image
      tags: [Admin]
      security:
        - bearerAuth: []
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
        - { name: imageId, in: path, required: true, schema: { type: integer } }
      responses:
        '204': { description: Removed }
        '403': { description: Not an admin }
        '404': { description: Product or image not found }

  /api/admin/categories:
    post:
      summary: Create a category
      tags: [Admin]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CategoryWriteRequest' }
      responses:
        '201':
          description: Created
          content: { application/json: { schema: { $ref: '#/components/schemas/Category' } } }
        '403': { description: Not an admin }
        '409': { description: Slug already used }
        '422': { description: Validation failed }

  /api/admin/categories/{id}:
    put:
      summary: Replace a category
      tags: [Admin]
      security:
        - bearerAuth: []
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CategoryWriteRequest' }
      responses:
        '200':
          description: Updated
          content: { application/json: { schema: { $ref: '#/components/schemas/Category' } } }
        '403': { description: Not an admin }
        '404': { description: Category not found }
        '409': { description: Slug already used }
        '422': { description: Validation failed }
    delete:
      summary: Soft-delete a category
      description: Fails with 409 if the category still has active products.
      tags: [Admin]
      security:
        - bearerAuth: []
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        '204': { description: Deleted }
        '403': { description: Not an admin }
        '404': { description: Category not found }
        '409': { description: Category has products }

  /api/admin/categories/{id}/image:
    post:
      summary: Upload a category image
      description: Multipart upload (field `image`, JPEG/PNG/WebP, max 5MB). Replaces any previous local file. Stored under public/uploads/categories.
      tags: [Admin]
      security:
        - bearerAuth: []
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                image: { type: string, format: binary }
      responses:
        '200':
          description: Updated category
          content: { application/json: { schema: { $ref: '#/components/schemas/Category' } } }
        '403': { description: Not an admin }
        '404': { description: Category not found }
        '422': { description: Invalid image }

  /api/admin/categories/{id}/attributes:
    get:
      summary: List a category's spec attributes
      tags: [Admin]
      security:
        - bearerAuth: []
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        '200':
          description: Attribute list
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { $ref: '#/components/schemas/CategoryAttribute' }
        '403': { description: Not an admin }
        '404': { description: Category not found }
    post:
      summary: Add a spec attribute to a category
      tags: [Admin]
      security:
        - bearerAuth: []
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CategoryAttributeWriteRequest' }
      responses:
        '201':
          description: Created
          content: { application/json: { schema: { $ref: '#/components/schemas/CategoryAttribute' } } }
        '403': { description: Not an admin }
        '404': { description: Category not found }
        '409': { description: Attribute code already used in this category }
        '422': { description: Validation failed (e.g. options required for select) }

  /api/admin/categories/{id}/attributes/{attrId}:
    put:
      summary: Replace a category attribute
      tags: [Admin]
      security:
        - bearerAuth: []
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
        - { name: attrId, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CategoryAttributeWriteRequest' }
      responses:
        '200':
          description: Updated
          content: { application/json: { schema: { $ref: '#/components/schemas/CategoryAttribute' } } }
        '403': { description: Not an admin }
        '404': { description: Category or attribute not found }
        '409': { description: Attribute code already used in this category }
        '422': { description: Validation failed }
    delete:
      summary: Delete a category attribute
      description: Also removes all product values for this attribute (cascade).
      tags: [Admin]
      security:
        - bearerAuth: []
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
        - { name: attrId, in: path, required: true, schema: { type: integer } }
      responses:
        '204': { description: Deleted }
        '403': { description: Not an admin }
        '404': { description: Category or attribute not found }

  /api/admin/collections:
    post:
      summary: Create a collection
      tags: [Admin]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CollectionWriteRequest' }
      responses:
        '201':
          description: Created
          content: { application/json: { schema: { $ref: '#/components/schemas/Collection' } } }
        '403': { description: Not an admin }
        '409': { description: Slug already used }
        '422': { description: Validation failed }

  /api/admin/collections/{id}:
    put:
      summary: Replace a collection
      tags: [Admin]
      security:
        - bearerAuth: []
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CollectionWriteRequest' }
      responses:
        '200':
          description: Updated
          content: { application/json: { schema: { $ref: '#/components/schemas/Collection' } } }
        '403': { description: Not an admin }
        '404': { description: Collection not found }
        '409': { description: Slug already used }
        '422': { description: Validation failed }
    delete:
      summary: Soft-delete a collection
      description: Fails with 409 if the collection still has active products.
      tags: [Admin]
      security:
        - bearerAuth: []
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        '204': { description: Deleted }
        '403': { description: Not an admin }
        '404': { description: Collection not found }
        '409': { description: Collection has products }

  /api/admin/collections/{id}/image:
    post:
      summary: Upload a collection image
      description: Multipart upload (field `image`, JPEG/PNG/WebP, max 5MB). Replaces any previous local file. Stored under public/uploads/collections.
      tags: [Admin]
      security:
        - bearerAuth: []
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                image: { type: string, format: binary }
      responses:
        '200':
          description: Updated collection
          content: { application/json: { schema: { $ref: '#/components/schemas/Collection' } } }
        '403': { description: Not an admin }
        '404': { description: Collection not found }
        '422': { description: Invalid image }

  /api/consultations:
    post:
      summary: Submit a design-consultation request
      description: Public storefront form submission.
      tags: [Catalog]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ConsultationRequest' }
      responses:
        '201':
          description: Created
          content: { application/json: { schema: { $ref: '#/components/schemas/Consultation' } } }
        '422':
          description: Validation failed
          content: { application/json: { schema: { $ref: '#/components/schemas/ValidationError' } } }

  /api/admin/orders:
    get:
      summary: List orders
      description: Requires ROLE_ADMIN. Newest first.
      tags: [Admin]
      security:
        - bearerAuth: []
      parameters:
        - { name: status, in: query, schema: { type: string, enum: [pending, confirmed, delivering, completed, cancelled] } }
        - { name: q, in: query, schema: { type: string }, description: Search order number / customer / email }
        - { name: limit, in: query, schema: { type: integer, minimum: 1, maximum: 100 } }
        - { name: offset, in: query, schema: { type: integer, minimum: 0 } }
      responses:
        '200':
          description: Orders
          content:
            application/json:
              schema:
                type: object
                properties:
                  items: { type: array, items: { $ref: '#/components/schemas/Order' } }
                  total: { type: integer }
        '403': { description: Not an admin }
        '422': { description: Invalid status filter }

  /api/admin/orders/{id}:
    get:
      summary: Get an order with line items
      tags: [Admin]
      security:
        - bearerAuth: []
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        '200':
          description: Order detail
          content: { application/json: { schema: { $ref: '#/components/schemas/OrderDetail' } } }
        '403': { description: Not an admin }
        '404': { description: Order not found }
    patch:
      summary: Change an order's status
      tags: [Admin]
      security:
        - bearerAuth: []
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/OrderStatusRequest' }
      responses:
        '200':
          description: Updated
          content: { application/json: { schema: { $ref: '#/components/schemas/Order' } } }
        '403': { description: Not an admin }
        '404': { description: Order not found }
        '422': { description: Invalid status }

  /api/admin/customers:
    get:
      summary: List customers (aggregated from orders)
      tags: [Admin]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Customers
          content:
            application/json:
              schema:
                type: object
                properties:
                  items: { type: array, items: { $ref: '#/components/schemas/Customer' } }
        '403': { description: Not an admin }

  /api/admin/consultations:
    get:
      summary: List consultation requests
      tags: [Admin]
      security:
        - bearerAuth: []
      parameters:
        - { name: status, in: query, schema: { type: string, enum: [new, contacted, closed] } }
        - { name: limit, in: query, schema: { type: integer, minimum: 1, maximum: 100 } }
        - { name: offset, in: query, schema: { type: integer, minimum: 0 } }
      responses:
        '200':
          description: Consultations
          content:
            application/json:
              schema:
                type: object
                properties:
                  items: { type: array, items: { $ref: '#/components/schemas/Consultation' } }
                  total: { type: integer }
        '403': { description: Not an admin }
        '422': { description: Invalid status filter }

  /api/admin/consultations/{id}:
    patch:
      summary: Change a consultation's status
      tags: [Admin]
      security:
        - bearerAuth: []
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ConsultationStatusRequest' }
      responses:
        '200':
          description: Updated
          content: { application/json: { schema: { $ref: '#/components/schemas/Consultation' } } }
        '403': { description: Not an admin }
        '404': { description: Consultation not found }
        '422': { description: Invalid status }

  /api/admin/dashboard:
    get:
      summary: Dashboard metrics
      description: Headline stats, recent orders and best-selling products.
      tags: [Admin]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Metrics
          content: { application/json: { schema: { $ref: '#/components/schemas/DashboardStats' } } }
        '403': { description: Not an admin }

  /api/catalog-menu:
    get:
      summary: Catalog mega-menu content (public)
      description: Admin-editable heading/button text plus a random promo product strip.
      tags: [Catalog]
      responses:
        '200':
          description: Menu content
          content: { application/json: { schema: { $ref: '#/components/schemas/CatalogMenu' } } }

  /api/search/suggest:
    get:
      summary: Typo-tolerant search suggestions (public)
      description: pg_trgm-backed autocomplete. Returns live product matches plus a "did you mean" suggestion when the query only matches fuzzily.
      tags: [Catalog]
      parameters:
        - { name: q, in: query, required: false, schema: { type: string, maxLength: 120 }, description: Query (min 2 chars to return results) }
        - { name: limit, in: query, required: false, schema: { type: integer, minimum: 1, maximum: 50, default: 6 } }
      responses:
        '200':
          description: Suggestions
          content: { application/json: { schema: { $ref: '#/components/schemas/SearchSuggest' } } }
        '422': { description: Validation failed }

  /api/admin/catalog-menu:
    get:
      summary: Get editable catalog-menu text
      tags: [Admin]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Editable text
          content: { application/json: { schema: { $ref: '#/components/schemas/CatalogMenuText' } } }
        '403': { description: Not an admin }
    put:
      summary: Update catalog-menu text
      tags: [Admin]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CatalogMenuWriteRequest' }
      responses:
        '200':
          description: Updated
          content: { application/json: { schema: { $ref: '#/components/schemas/CatalogMenuText' } } }
        '403': { description: Not an admin }
        '422': { description: Validation failed }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: Paste the `access_token` returned by `/api/login`.

  schemas:
    RegisterRequest:
      type: object
      required: [email, password, username, name, lastname]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
          maxLength: 4096
        username:
          type: string
          minLength: 3
          maxLength: 180
        name:
          type: string
          maxLength: 100
        lastname:
          type: string
          maxLength: 100
        profilePhoto:
          type: [string, "null"]
          maxLength: 255
          description: Filename or path reference (not the binary).
        birthday:
          type: [string, "null"]
          format: date
          description: YYYY-MM-DD
        description:
          type: [string, "null"]
        statusText:
          type: [string, "null"]
          maxLength: 255
          description: Short free-text status (1-2 sentences).
        timezone:
          type: [string, "null"]
          maxLength: 64
          description: IANA timezone identifier, e.g. Europe/Istanbul.
        language:
          type: [string, "null"]
          maxLength: 12
          description: ISO 639-1 language code, e.g. en, az.

    UpdateProfileRequest:
      type: object
      required: [username, name, lastname]
      properties:
        username:
          type: string
          minLength: 3
          maxLength: 180
        name:
          type: string
          maxLength: 100
        lastname:
          type: string
          maxLength: 100
        timezone:
          type: [string, "null"]
          maxLength: 64
          description: IANA timezone identifier, e.g. Europe/Istanbul.
        language:
          type: [string, "null"]
          maxLength: 12
          description: ISO 639-1 language code, e.g. en, az.
        birthday:
          type: [string, "null"]
          format: date
          description: YYYY-MM-DD
        description:
          type: [string, "null"]
        statusText:
          type: [string, "null"]
          maxLength: 255

    ChangePasswordRequest:
      type: object
      required: [currentPassword, newPassword]
      properties:
        currentPassword:
          type: string
        newPassword:
          type: string
          minLength: 8
          maxLength: 4096

    UsernameAvailability:
      type: object
      properties:
        username:
          type: string
        available:
          type: boolean

    PhotoUploaded:
      type: object
      properties:
        profilePhoto:
          type: string
          description: Stored path relative to the uploads root.
          example: avatars/alice-65f0c1ab2d3e4.webp
        url:
          type: string
          description: Public URL to fetch the image.
          example: /uploads/avatars/alice-65f0c1ab2d3e4.webp

    AppearancePreferences:
      type: object
      description: >
        Client-side appearance/theming preferences. Only fields the user has
        saved are present; the client supplies defaults for anything absent.
      properties:
        theme:
          type: string
          enum: [light, dark, dim]
        accent:
          type: string
          enum: [terracotta, blue, facebook, purple, green, rose]
        fontFamily:
          type: string
          enum: [system, classic, mono]
        fontSize:
          type: string
          enum: [sm, md, lg]

    UserPreferences:
      type: object
      properties:
        appearance:
          $ref: '#/components/schemas/AppearancePreferences'

    UpdatePreferencesRequest:
      type: object
      description: >
        Partial preferences. Same shape as UserPreferences; every field is
        optional and merged onto the stored values.
      properties:
        appearance:
          type: object
          properties:
            theme:
              type: string
              enum: [light, dark, dim]
            accent:
              type: string
              enum: [terracotta, blue, facebook, purple, green, rose]
            fontFamily:
              type: string
              enum: [system, classic, mono]
            fontSize:
              type: string
              enum: [sm, md, lg]

    Credentials:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    RefreshRequest:
      type: object
      required: [refresh_token]
      properties:
        refresh_token:
          type: string

    TokenResponse:
      type: object
      properties:
        token_type:
          type: string
          example: Bearer
        access_token:
          type: string
        expires_at:
          type: string
          format: date-time
        refresh_token:
          type: string
        refresh_token_expires_at:
          type: string
          format: date-time

    UserCreated:
      type: object
      properties:
        id:
          type: integer
        email:
          type: string
        username:
          type: string

    User:
      type: object
      properties:
        id:
          type: integer
        email:
          type: string
        username:
          type: string
        name:
          type: string
        lastname:
          type: string
        roles:
          type: array
          items:
            type: string
          example: [ROLE_USER]
        profilePhoto:
          type: [string, "null"]
          description: Stored path relative to the uploads root.
        profilePhotoUrl:
          type: [string, "null"]
          description: Public URL for profilePhoto, or null when unset.
        timezone:
          type: [string, "null"]
          description: IANA timezone identifier.
        language:
          type: [string, "null"]
          description: ISO 639-1 language code.
        birthday:
          type: [string, "null"]
          format: date
        description:
          type: [string, "null"]
        statusText:
          type: [string, "null"]

    Error:
      type: object
      properties:
        error:
          type: string
        message:
          type: string

    ValidationError:
      description: Symfony validation error (RFC 7807-style).
      type: object
      properties:
        type:
          type: string
        title:
          type: string
          example: Validation Failed
        status:
          type: integer
          example: 422
        detail:
          type: string
        violations:
          type: array
          items:
            type: object
            properties:
              propertyPath:
                type: string
              title:
                type: string

    Product:
      type: object
      description: >
        A storefront product. `category` / `collection` are display names;
        `categorySlug` / `collectionSlug` are the matching URL slugs.
      properties:
        id: { type: integer }
        name: { type: string }
        slug: { type: string }
        price: { type: integer, description: Whole manat }
        oldPrice: { type: [integer, "null"] }
        onSale: { type: boolean }
        isNew: { type: boolean }
        inStock: { type: boolean }
        freeDelivery: { type: boolean }
        warrantyYears: { type: integer }
        image: { type: [string, "null"], description: Primary gallery image (first), for back-compat with cards }
        images:
          type: array
          description: Ordered gallery; first is primary
          items: { $ref: '#/components/schemas/ProductImage' }
        category: { type: string }
        categoryId: { type: integer }
        categorySlug: { type: string }
        collection: { type: string }
        collectionId: { type: integer }
        collectionSlug: { type: string }
        specs:
          type: array
          description: Category-driven spec rows (empty on list endpoints)
          items: { $ref: '#/components/schemas/ProductSpec' }
        description: { type: [string, "null"] }

    ProductSpec:
      type: object
      description: One resolved spec row for a product (from its category's attributes).
      properties:
        code: { type: string }
        label: { type: string }
        type: { type: string, enum: [text, number, boolean, select] }
        unit: { type: [string, "null"] }
        value: { type: string, description: Display-formatted value (booleans as bəli/xeyr, unit appended) }
        raw: { type: [string, "null"], description: Stored raw value, for edit forms }

    ProductImage:
      type: object
      properties:
        id: { type: integer }
        url: { type: string, description: Absolute URL or path relative to the uploads root }
        sortOrder: { type: integer, description: Present on the add/upload responses }

    Category:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        slug: { type: string }
        image: { type: [string, "null"] }
        productCount: { type: integer, description: Live count of active products }
        priceFrom: { type: [integer, "null"], description: Lowest product price, or null if empty }

    Collection:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        slug: { type: string }
        tagline: { type: [string, "null"] }
        image: { type: [string, "null"] }
        featured: { type: boolean }
        productCount: { type: integer }

    ProductWriteRequest:
      type: object
      required: [name, price, categoryId, collectionId]
      description: Full editable product payload (POST create / PUT replace).
      properties:
        name: { type: string, maxLength: 180 }
        price: { type: integer, minimum: 1, description: Whole manat }
        categoryId: { type: integer }
        collectionId: { type: integer }
        oldPrice: { type: [integer, "null"], minimum: 0, description: 'Pre-discount price; when > price the product is automatically "on sale". No manual onSale flag.' }
        isNew: { type: boolean, default: false }
        inStock: { type: boolean, default: true }
        freeDelivery: { type: boolean, default: true }
        warrantyYears: { type: integer, default: 2 }
        description: { type: [string, "null"] }
        attributes:
          type: object
          description: >-
            Category-driven spec values keyed by attribute code, e.g.
            {"material": "Parça", "seat_count": 3, "foldable": true}. Validated
            against the category's attribute definitions (required, options,
            number). Unknown codes are ignored.
          additionalProperties: true

    ProductQuickUpdateRequest:
      type: object
      description: Partial update for inline list toggles. Only provided fields are applied.
      properties:
        inStock: { type: [boolean, "null"] }
        isNew: { type: [boolean, "null"] }

    CategoryAttribute:
      type: object
      description: A spec field defined on a category.
      properties:
        id: { type: integer }
        label: { type: string }
        code: { type: string, description: Stable machine key, unique within the category }
        type: { type: string, enum: [text, number, boolean, select] }
        unit: { type: [string, "null"] }
        options:
          type: array
          description: Allowed choices for select-type attributes
          items: { type: string }
        required: { type: boolean }
        filterable: { type: boolean }
        sortOrder: { type: integer }

    CategoryAttributeWriteRequest:
      type: object
      required: [label]
      properties:
        label: { type: string, maxLength: 120 }
        code: { type: [string, "null"], maxLength: 80, description: Derived from label when omitted }
        type: { type: string, enum: [text, number, boolean, select], default: text }
        unit: { type: [string, "null"], maxLength: 20 }
        options:
          type: [array, "null"]
          items: { type: string }
          description: Required (non-empty) for select type
        required: { type: boolean, default: false }
        filterable: { type: boolean, default: false }
        sortOrder: { type: [integer, "null"], description: Appended to the end when omitted }

    CategoryWriteRequest:
      type: object
      required: [name]
      properties:
        name: { type: string, maxLength: 120 }
        image: { type: [string, "null"] }
        sortOrder: { type: integer, default: 0 }

    CatalogMenuText:
      type: object
      properties:
        heading: { type: string }
        subheading: { type: string }
        buttonLabel: { type: string }
        buttonHref: { type: string }

    CatalogMenu:
      type: object
      description: Public mega-menu content (editable text + random promos).
      allOf:
        - $ref: '#/components/schemas/CatalogMenuText'
        - type: object
          properties:
            promos:
              type: array
              items:
                type: object
                properties:
                  id: { type: integer }
                  name: { type: string }
                  image: { type: [string, "null"] }
                  price: { type: integer }
                  href: { type: string }

    CatalogMenuWriteRequest:
      type: object
      required: [heading, buttonLabel, buttonHref]
      properties:
        heading: { type: string, maxLength: 120 }
        subheading: { type: string, maxLength: 200 }
        buttonLabel: { type: string, maxLength: 60 }
        buttonHref: { type: string, maxLength: 200 }

    SearchSuggest:
      type: object
      properties:
        query: { type: string }
        suggestion: { type: [string, "null"], description: '"Did you mean" product name, or null' }
        results:
          type: array
          items:
            type: object
            properties:
              id: { type: integer }
              name: { type: string }
              slug: { type: string }
              price: { type: integer }
              image: { type: [string, "null"] }
              href: { type: string }

    CollectionWriteRequest:
      type: object
      required: [name]
      properties:
        name: { type: string, maxLength: 120 }
        tagline: { type: [string, "null"] }
        image: { type: [string, "null"] }
        featured: { type: boolean, default: false }
        sortOrder: { type: integer, default: 0 }

    Order:
      type: object
      properties:
        id: { type: integer, description: Numeric id for API calls }
        orderNumber: { type: string, example: OP-1042 }
        customer: { type: string }
        email: { type: string }
        items: { type: integer, description: Total item quantity }
        total: { type: integer, description: Whole manat }
        status: { type: string, enum: [pending, confirmed, delivering, completed, cancelled] }
        date: { type: string, format: date }

    OrderDetail:
      allOf:
        - $ref: '#/components/schemas/Order'
        - type: object
          properties:
            lines:
              type: array
              items:
                type: object
                properties:
                  productId: { type: [integer, "null"] }
                  name: { type: string }
                  unitPrice: { type: integer }
                  quantity: { type: integer }
                  lineTotal: { type: integer }

    OrderStatusRequest:
      type: object
      required: [status]
      properties:
        status: { type: string, enum: [pending, confirmed, delivering, completed, cancelled] }

    Customer:
      type: object
      description: Aggregated from orders, grouped by email.
      properties:
        name: { type: string }
        email: { type: string }
        orders: { type: integer }
        spent: { type: integer, description: Total spent in whole manat }
        joined: { type: string, format: date, description: First order date }

    Consultation:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        phone: { type: string }
        room: { type: string, enum: [living-room, bedroom, kitchen, kids, office] }
        message: { type: [string, "null"] }
        status: { type: string, enum: [new, contacted, closed] }
        createdAt: { type: string, format: date-time }

    ConsultationRequest:
      type: object
      required: [name, phone, room]
      properties:
        name: { type: string, maxLength: 120 }
        phone: { type: string, maxLength: 40 }
        room: { type: string, enum: [living-room, bedroom, kitchen, kids, office] }
        message: { type: [string, "null"], maxLength: 2000 }

    ConsultationStatusRequest:
      type: object
      required: [status]
      properties:
        status: { type: string, enum: [new, contacted, closed] }

    DashboardStats:
      type: object
      properties:
        revenue: { type: integer, description: Delivering + completed order totals }
        orders: { type: integer }
        products: { type: integer }
        consultations: { type: integer, description: New consultation count }
        lowStock: { type: integer, description: Out-of-stock product count }
        categories: { type: integer }
